name: Auto Sync M3U Indonesia

on:
  schedule:
    # Berjalan setiap hari pada jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Memungkinkan kamu menjalankan script secara manual dari tab 'Actions'

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Jalankan Script Sinkronisasi
        run: python sync_iptv.py

      - name: Commit dan Push Perubahan
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add indonesia_synced.m3u
          git commit -m "Auto-update: Sinkronisasi M3U Indonesia dengan EPG" || echo "Tidak ada perubahan pada M3U"
          git push
